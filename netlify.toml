# Netlify config – static site, no build step
[build]
  publish = "."

# Pretty URLs: /impressum -> impressum.html
[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 200

[[redirects]]
  from = "/confirmed"
  to = "/confirmed.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Dateinamen sind NICHT gehasht -> kein immutable/Langzeit-Cache, sonst bleibt
# alte JS/CSS beim Nutzer hängen. Revalidieren (304) ist für diese Mini-Site billig.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
